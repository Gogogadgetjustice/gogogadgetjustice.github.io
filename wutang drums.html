<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WU-TANG DRUM SEQUENCER</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #ccc; font-family: 'Courier New', monospace; min-height: 100vh; padding: 24px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
  .logo { font-size: 28px; font-weight: 900; color: #f5c400; letter-spacing: 10px; text-shadow: 0 0 30px #f5c40066; }
  .logo span { display: block; font-size: 8px; letter-spacing: 5px; color: #444; font-weight: normal; margin-top: 2px; }
  .transport { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .bpm-box { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .label { font-size: 8px; color: #555; letter-spacing: 3px; }
  .bpm-row { display: flex; align-items: center; gap: 4px; }
  .bpm-val { width: 64px; background: #111; border: 1px solid #333; color: #f5c400; font-size: 26px; font-weight: bold; font-family: 'Courier New', monospace; text-align: center; padding: 2px 0; border-radius: 4px; -moz-appearance: textfield; }
  .bpm-val::-webkit-inner-spin-button { -webkit-appearance: none; }
  .btn { background: #111; border: 1px solid #2a2a2a; color: #999; font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 1px; padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: all 0.1s; }
  .btn:hover { border-color: #555; color: #ccc; }
  .btn-arrow { padding: 6px 10px; font-size: 14px; }
  #play-btn { font-size: 13px; font-weight: bold; padding: 9px 24px; min-width: 100px; border-color: #1a3a1a; color: #5d5; }
  #play-btn.playing { border-color: #3a1a1a; color: #d55; box-shadow: 0 0 12px #ff000022; }
  .swing-box { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  input[type=range] { width: 90px; accent-color: #f5c400; cursor: pointer; }
  .steps-box { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .steps-row { display: flex; gap: 3px; }
  .steps-btn { padding: 4px 8px; font-size: 9px; }
  .steps-btn.active { border-color: #f5c400; color: #f5c400; }
  .grid-wrapper { display: flex; flex-direction: column; gap: 5px; }
  .ruler { display: flex; padding-left: 158px; margin-bottom: 2px; }
  .ruler-cell { flex: 1; text-align: center; font-size: 8px; color: #333; pointer-events: none; }
  .ruler-cell.beat { color: #555; }
  .ruler-gap { width: 4px; flex-shrink: 0; }
  .track-row { display: flex; align-items: center; }
  .track-info { width: 158px; flex-shrink: 0; display: flex; align-items: center; gap: 5px; padding-right: 8px; }
  .track-name { font-size: 9px; font-weight: bold; letter-spacing: 2px; width: 38px; flex-shrink: 0; }
  .file-drop-zone { width: 62px; height: 26px; border: 1px dashed #2a2a2a; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 7px; color: #333; cursor: pointer; transition: border-color 0.15s, color 0.15s; overflow: hidden; padding: 0 3px; text-align: center; line-height: 1.2; word-break: break-all; }
  .file-drop-zone:hover, .file-drop-zone.drag-over { border-color: #f5c400; color: #f5c400; }
  .file-drop-zone.loaded { border-color: #3a3a1a; color: #888; border-style: solid; }
  .mute-btn, .solo-btn { width: 18px; height: 18px; font-size: 7px; letter-spacing: 0; padding: 0; border-radius: 3px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .mute-btn.active { border-color: #f5c400; color: #f5c400; background: #1a1800; }
  .solo-btn.active { border-color: #00bcd4; color: #00bcd4; background: #001a1e; }
  .steps-grid { display: flex; flex: 1; }
  .step-group { display: flex; gap: 2px; flex: 1; }
  .step-group + .step-group { margin-left: 4px; }
  .step { flex: 1; height: 34px; border-radius: 3px; cursor: pointer; border: 1px solid #1c1c1c; background: #141414; transition: background 0.06s, border-color 0.06s, box-shadow 0.06s; }
  .step:hover { border-color: #333; background: #1c1c1c; }
  .step.active { background: var(--tc, #f5c400); border-color: var(--tc, #f5c400); box-shadow: 0 0 6px var(--tc, #f5c400); }
  .step.playhead { border-color: #fff !important; box-shadow: 0 0 14px #ffffff99 !important; }
  .step.active.playhead { filter: brightness(1.7); }
  footer { margin-top: 20px; font-size: 8px; color: #2a2a2a; letter-spacing: 2px; text-align: center; }
</style>
</head>
<body>
<header>
  <div class="logo">WU-TANG<span>36 CHAMBERS · DRUM SEQUENCER</span></div>
  <div class="transport">
    <div class="bpm-box">
      <div class="label">BPM</div>
      <div class="bpm-row">
        <button class="btn btn-arrow" id="bpm-down">−</button>
        <input class="bpm-val" type="number" id="bpm" value="90" min="40" max="220">
        <button class="btn btn-arrow" id="bpm-up">+</button>
      </div>
    </div>
    <button class="btn" id="tap-btn">TAP</button>
    <button class="btn" id="play-btn">▶ PLAY</button>
    <div class="swing-box">
      <div class="label" id="swing-label">SWING 0%</div>
      <input type="range" id="swing" min="0" max="75" value="0">
    </div>
    <div class="steps-box">
      <div class="label">STEPS</div>
      <div class="steps-row">
        <button class="btn steps-btn active" data-steps="16">16</button>
        <button class="btn steps-btn" data-steps="32">32</button>
      </div>
    </div>
    <button class="btn" id="random-btn">RANDOM</button>
    <button class="btn" id="clear-btn">CLEAR</button>
  </div>
</header>
<div class="ruler" id="ruler"></div>
<div class="grid-wrapper" id="grid"></div>
<footer>SPACE: PLAY/STOP &nbsp;·&nbsp; CLICK: TOGGLE STEP &nbsp;·&nbsp; DRAG &amp; DROP AUDIO FILES ONTO TRACK</footer>
<script>
const TRACKS = [
  { name: 'KICK',  color: '#FF6B35' },
  { name: 'SNARE', color: '#FFD700' },
  { name: 'CLAP',  color: '#FF4081' },
  { name: 'HAT-C', color: '#00E5FF' },
  { name: 'HAT-O', color: '#69F0AE' },
  { name: 'TOM H', color: '#E040FB' },
  { name: 'TOM L', color: '#FF9800' },
  { name: 'PERC',  color: '#B2FF59' },
];
const MAX = 32;
let totalSteps = 16, bpm = 90, swing = 0, isPlaying = false, currentStep = -1;
const patterns = TRACKS.map(() => Array.from({length: MAX}, () => ({ active: false, velocity: 100 })));
const ts = TRACKS.map(() => ({ buffer: null, fileName: null, muted: false, solo: false }));
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playSound(ti, time, velocity) {
  const ctx = audioCtx; if (!ctx) return;
  const t = ts[ti]; if (!t.buffer || t.muted) return;
  if (ts.some(x => x.solo) && !t.solo) return;
  const src = ctx.createBufferSource(); src.buffer = t.buffer;
  const g = ctx.createGain(); g.gain.value = velocity / 100;
  src.connect(g); g.connect(ctx.destination); src.start(time);
}
let schedStep = 0, nextNote = 0, schedTimer = null;
function scheduler() {
  if (!isPlaying) return;
  while (nextNote < audioCtx.currentTime + 0.12) {
    const s = schedStep;
    const spStep = 60 / bpm / 4;
    const swOff = (s % 2 === 1) ? spStep * (swing / 100) * 0.4 : 0;
    const t = nextNote + swOff;
    patterns.forEach((pat, ti) => { const p = pat[s % totalSteps]; if (p.active) playSound(ti, t, p.velocity); });
    const delay = Math.max(0, (nextNote - audioCtx.currentTime) * 1000 - 10);
    const cap = s;
    setTimeout(() => { if (isPlaying) setPlayhead(cap); }, delay);
    nextNote += spStep;
    schedStep = (schedStep + 1) % totalSteps;
  }
  schedTimer = setTimeout(scheduler, 20);
}
function setPlayhead(step) {
  currentStep = step;
  document.querySelectorAll('.step.playhead').forEach(el => el.classList.remove('playhead'));
  document.querySelectorAll(`.step[data-step="${step}"]`).forEach(el => el.classList.add('playhead'));
}
const playBtn = document.getElementById('play-btn');
function startPlayback() {
  getCtx(); schedStep = 0; nextNote = audioCtx.currentTime + 0.05; isPlaying = true;
  playBtn.textContent = '■ STOP'; playBtn.classList.add('playing'); scheduler();
}
function stopPlayback() {
  isPlaying = false; clearTimeout(schedTimer);
  playBtn.textContent = '▶ PLAY'; playBtn.classList.remove('playing');
  document.querySelectorAll('.step.playhead').forEach(el => el.classList.remove('playhead'));
  currentStep = -1;
}
function buildRuler() {
  const r = document.getElementById('ruler'); r.innerHTML = '';
  for (let i = 0; i < totalSteps; i++) {
    if (i % 4 === 0 && i !== 0) { const g = document.createElement('div'); g.className = 'ruler-gap'; r.appendChild(g); }
    const d = document.createElement('div');
    d.className = 'ruler-cell' + (i % 4 === 0 ? ' beat' : '');
    d.textContent = i % 4 === 0 ? i + 1 : '·';
    r.appendChild(d);
  }
}
function buildGrid() {
  buildRuler();
  const gridEl = document.getElementById('grid'); gridEl.innerHTML = '';
  TRACKS.forEach((def, ti) => {
    const row = document.createElement('div'); row.className = 'track-row';
    const info = document.createElement('div'); info.className = 'track-info';
    const name = document.createElement('div'); name.className = 'track-name';
    name.textContent = def.name; name.style.color = def.color;
    const dz = document.createElement('div'); dz.className = 'file-drop-zone';
    dz.textContent = ts[ti].fileName ? (ts[ti].fileName.length > 10 ? ts[ti].fileName.slice(0,10)+'…' : ts[ti].fileName) : '+ WAV';
    if (ts[ti].fileName) dz.classList.add('loaded');
    const fi = document.createElement('input'); fi.type = 'file'; fi.accept = 'audio/*'; fi.style.display = 'none';
    fi.addEventListener('change', () => fi.files[0] && loadFile(ti, fi.files[0]));
    dz.addEventListener('click', () => { getCtx(); fi.click(); });
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); if (e.dataTransfer.files[0]) loadFile(ti, e.dataTransfer.files[0]); });
    const mb = document.createElement('button'); mb.className = 'btn mute-btn' + (ts[ti].muted ? ' active' : ''); mb.textContent = 'M';
    mb.addEventListener('click', () => { ts[ti].muted = !ts[ti].muted; mb.classList.toggle('active'); });
    const sb = document.createElement('button'); sb.className = 'btn solo-btn' + (ts[ti].solo ? ' active' : ''); sb.textContent = 'S';
    sb.addEventListener('click', () => { ts[ti].solo = !ts[ti].solo; sb.classList.toggle('active'); });
    info.append(name, dz, fi, mb, sb);
    const sg = document.createElement('div'); sg.className = 'steps-grid';
    let curGroup = null;
    for (let si = 0; si < totalSteps; si++) {
      if (si % 4 === 0) { curGroup = document.createElement('div'); curGroup.className = 'step-group'; sg.appendChild(curGroup); }
      const s = document.createElement('div');
      s.className = 'step' + (patterns[ti][si].active ? ' active' : '');
      s.dataset.ti = ti; s.dataset.step = si;
      s.style.setProperty('--tc', def.color);
      if (si === currentStep) s.classList.add('playhead');
      curGroup.appendChild(s);
    }
    row.append(info, sg);
    gridEl.appendChild(row);
  });
}
// Paint-drag on steps
let painting = false, paintVal = null, paintTi = null;
document.addEventListener('mousedown', e => {
  const s = e.target.closest('.step');
  if (!s || e.button !== 0) return;
  painting = true; paintTi = +s.dataset.ti;
  patterns[paintTi][+s.dataset.step].active = !patterns[paintTi][+s.dataset.step].active;
  paintVal = patterns[paintTi][+s.dataset.step].active;
  s.classList.toggle('active', paintVal);
});
document.addEventListener('mousemove', e => {
  if (!painting) return;
  const s = e.target.closest('.step');
  if (!s || +s.dataset.ti !== paintTi) return;
  const si = +s.dataset.step;
  if (patterns[paintTi][si].active !== paintVal) {
    patterns[paintTi][si].active = paintVal;
    s.classList.toggle('active', paintVal);
  }
});
document.addEventListener('mouseup', () => { painting = false; paintVal = null; paintTi = null; });
async function loadFile(ti, file) {
  const ctx = getCtx();
  try {
    const ab = await file.arrayBuffer();
    ts[ti].buffer = await ctx.decodeAudioData(ab);
    ts[ti].fileName = file.name;
    buildGrid();
  } catch(e) { console.error('Could not decode', file.name, e); }
}
playBtn.addEventListener('click', () => isPlaying ? stopPlayback() : startPlayback());
document.getElementById('bpm').addEventListener('input', e => bpm = Math.min(220, Math.max(40, +e.target.value || 90)));
document.getElementById('bpm-up').addEventListener('click', () => { bpm = Math.min(220, bpm+1); document.getElementById('bpm').value = bpm; });
document.getElementById('bpm-down').addEventListener('click', () => { bpm = Math.max(40, bpm-1); document.getElementById('bpm').value = bpm; });
document.getElementById('swing').addEventListener('input', e => { swing = +e.target.value; document.getElementById('swing-label').textContent = `SWING ${swing}%`; });
document.querySelectorAll('.steps-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    totalSteps = +btn.dataset.steps;
    document.querySelectorAll('.steps-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (isPlaying) schedStep = schedStep % totalSteps;
    buildGrid();
  });
});
document.getElementById('clear-btn').addEventListener('click', () => {
  patterns.forEach(p => p.forEach(s => { s.active = false; }));
  buildGrid();
});
const GROOVE = [
  s => s%4===0 ? 0.9 : s%4===2 ? 0.1 : 0.04,
  s => s%8===4 ? 0.92 : s%8===2 ? 0.1 : 0.04,
  s => [4,12].includes(s%16) ? 0.5 : 0.04,
  _ => 0.38, _ => 0.1, _ => 0.07, _ => 0.06, _ => 0.12,
];
document.getElementById('random-btn').addEventListener('click', () => {
  patterns.forEach((pat, ti) => pat.forEach((s, si) => {
    if (si >= totalSteps) return;
    s.active = Math.random() < GROOVE[ti](si);
    s.velocity = s.active ? 55 + Math.floor(Math.random()*72) : 100;
  }));
  buildGrid();
});
let taps = [];
document.getElementById('tap-btn').addEventListener('click', () => {
  const now = Date.now();
  taps = [...taps.filter(t => now-t < 3000), now];
  if (taps.length >= 2) {
    const intervals = taps.slice(1).map((t,i) => t-taps[i]);
    bpm = Math.min(220, Math.max(40, Math.round(60000 / (intervals.reduce((a,b)=>a+b)/intervals.length))));
    document.getElementById('bpm').value = bpm;
  }
});
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); isPlaying ? stopPlayback() : startPlayback(); }
});
buildGrid();
</script>
</body>
</html>
