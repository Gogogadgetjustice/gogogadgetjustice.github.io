<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceGen Batch Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --border: #1e242c;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --text: #c8d0da;
    --text-dim: #4a5568;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 229, 255, 0.06), transparent),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    width: 100%;
    max-width: 520px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,229,255,0.04), 0 20px 40px rgba(0,0,0,0.5);
  }

  .card-header {
    border-bottom: 1px solid var(--border);
    padding: 1.2rem 1.6rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: rgba(0,229,255,0.03);
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }

  .card-title {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-left: auto;
    margin-right: auto;
    padding-right: 45px;
  }

  .card-body { padding: 2rem 1.6rem; }

  .label {
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
    display: block;
  }

  .input-group { margin-bottom: 1.4rem; }

  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 1.1rem;
    padding: 0.65rem 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
    appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,229,255,0.08); }

  .note {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 0.35rem;
    font-family: var(--mono);
  }

  .btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.85rem;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    margin-top: 0.5rem;
  }
  .btn:hover:not(:disabled) {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 20px rgba(0,229,255,0.25);
  }
  .btn:disabled { border-color: var(--text-dim); color: var(--text-dim); cursor: not-allowed; }

  .btn-stop {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    font-family: var(--mono);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.85rem;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, color 0.2s;
    margin-top: 0.6rem;
    display: none;
  }
  .btn-stop:hover { background: var(--accent2); color: var(--bg); }
  .btn-stop.visible { display: block; }

  /* Progress section */
  .progress-wrap { margin-top: 1.8rem; display: none; }
  .progress-wrap.visible { display: block; }

  .progress-bar-bg {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    height: 6px;
    overflow: hidden;
    margin-bottom: 0.6rem;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), rgba(0,229,255,0.5));
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px rgba(0,229,255,0.5);
  }

  .progress-stats {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-bottom: 1rem;
  }
  .progress-stats span.accent { color: var(--accent); }

  /* Log */
  .log {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.8rem;
    max-height: 180px;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 0.7rem;
    line-height: 1.7;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .log::-webkit-scrollbar { width: 4px; }
  .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-line { color: var(--text-dim); }
  .log-line.ok { color: #4dff91; }
  .log-line.err { color: var(--accent2); }
  .log-line.info { color: var(--accent); }

  /* Done banner */
  .done-banner {
    display: none;
    margin-top: 1.2rem;
    border: 1px solid #4dff91;
    background: rgba(77,255,145,0.05);
    padding: 0.8rem 1rem;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: #4dff91;
    text-align: center;
    letter-spacing: 0.06em;
  }
  .done-banner.visible { display: block; }

  /* Previews */
  .previews {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
    gap: 4px;
    margin-top: 1rem;
  }
  .preview-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.4s;
    border: 1px solid var(--border);
  }
  .preview-img.loaded { opacity: 1; }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <span class="card-title">thispersondoesnotexist // batch dl</span>
  </div>

  <div class="card-body">
    <div class="input-group">
      <label class="label" for="imgCount">Number of images</label>
      <input type="number" id="imgCount" min="1" max="50" value="5" />
      <div class="note">// max 50 &nbsp;·&nbsp; saved to your browser Downloads folder</div>
    </div>

    <button class="btn" id="startBtn" onclick="startDownload()">▶ &nbsp;Execute</button>
    <button class="btn-stop" id="stopBtn" onclick="stopDownload()">■ &nbsp;Abort</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-stats">
        <span id="statLabel">Initialising...</span>
        <span class="accent" id="statCount">0 / 0</span>
      </div>
      <div class="log" id="log"></div>
      <div class="previews" id="previews"></div>
    </div>

    <div class="done-banner" id="doneBanner"></div>
  </div>
</div>

<script>
  let aborted = false;

  function log(msg, type = '') {
    const el = document.getElementById('log');
    const line = document.createElement('div');
    line.className = 'log-line ' + type;
    const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
    line.textContent = `[${ts}]  ${msg}`;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  function setProgress(done, total) {
    const pct = total ? (done / total) * 100 : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('statCount').textContent = `${done} / ${total}`;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function startDownload() {
    const count = parseInt(document.getElementById('imgCount').value);
    if (!count || count < 1 || count > 50) {
      alert('Please enter a number between 1 and 50.');
      return;
    }

    aborted = false;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').classList.add('visible');
    document.getElementById('progressWrap').classList.add('visible');
    document.getElementById('doneBanner').classList.remove('visible');
    document.getElementById('log').innerHTML = '';
    document.getElementById('previews').innerHTML = '';
    document.getElementById('statLabel').textContent = 'Starting...';
    setProgress(0, count);

    log(`Queued ${count} image(s) for download`, 'info');

    let success = 0;
    let failed = 0;

    for (let i = 1; i <= count; i++) {
      if (aborted) {
        log('Aborted by user.', 'err');
        break;
      }

      document.getElementById('statLabel').textContent = `Fetching image ${i}...`;
      log(`Fetching image ${i} of ${count}...`);

      try {
        // Unique cache-buster on every request so each face is different
        const bust = `${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const target = `https://thispersondoesnotexist.com/?cb=${bust}`;
        const url = `https://corsproxy.io/?url=${encodeURIComponent(target)}`;
        const resp = await fetch(url, { cache: 'no-store' });

        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        const blob = await resp.blob();
        const objUrl = URL.createObjectURL(blob);

        // Trigger download
        const a = document.createElement('a');
        a.href = objUrl;
        a.download = `face_${String(i).padStart(3, '0')}.jpg`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        // Show thumbnail
        const img = document.createElement('img');
        img.src = objUrl;
        img.className = 'preview-img';
        img.alt = `face ${i}`;
        img.onload = () => { img.classList.add('loaded'); URL.revokeObjectURL(objUrl); };
        document.getElementById('previews').appendChild(img);

        success++;
        log(`✓  Image ${i} saved as face_${String(i).padStart(3, '0')}.jpg`, 'ok');
      } catch (e) {
        failed++;
        log(`✗  Image ${i} failed — ${e.message}`, 'err');
      }

      setProgress(i, count);

      if (i < count && !aborted) await sleep(300);
    }

    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').classList.remove('visible');
    document.getElementById('statLabel').textContent = 'Done.';

    const banner = document.getElementById('doneBanner');
    if (!aborted) {
      banner.textContent = `✓  Completed — ${success} downloaded, ${failed} failed. Check your Downloads folder.`;
    } else {
      banner.textContent = `◼  Aborted — ${success} downloaded before stop.`;
      banner.style.borderColor = '#ff3d71';
      banner.style.color = '#ff3d71';
      banner.style.background = 'rgba(255,61,113,0.05)';
    }
    banner.classList.add('visible');
  }

  function stopDownload() {
    aborted = true;
    document.getElementById('stopBtn').classList.remove('visible');
    document.getElementById('statLabel').textContent = 'Aborting...';
  }
</script>

</body>
</html>
